<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1a4a" />
      <stop offset="100%" stop-color="#1a1030" />
    </linearGradient>
  </defs>

  <!-- Hexagon body -->
  <polygon
    points="32,3 58,17.5 58,46.5 32,61 6,46.5 6,17.5"
    fill="url(#hexGrad)"
    stroke="#f2c94c"
    stroke-width="3"
  />

  <!-- Inner hexagon accent -->
  <polygon
    points="32,13 49,22.5 49,41.5 32,51 15,41.5 15,22.5"
    fill="none"
    stroke="#f2c94c"
    stroke-width="1.5"
    opacity="0.5"
  />

  <!-- Question mark -->
  <text
    x="32"
    y="41"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="bold"
    font-size="30"
    fill="#f2c94c"
  >?</text>
</svg>
